<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtOps</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#86efac"/>
          <rect x="6" y="10" width="20" height="3" rx="1.5" fill="#052e16"/>
          <rect x="6" y="15" width="14" height="3" rx="1.5" fill="#052e16"/>
          <rect x="6" y="20" width="17" height="3" rx="1.5" fill="#052e16"/>
        </svg>
        <span class="logo-text">CourtOps</span>
      </div>
      <div id="statusDot" class="status-dot"></div>
    </header>

    <nav class="quick-links">
      <a class="link-btn" data-path="/dashboard" title="Dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="link-btn" data-path="/reservas" title="Reservas">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Reservas
      </a>
      <a class="link-btn" data-path="/clientes" title="Clientes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clientes
      </a>
      <a class="link-btn" data-path="/caja" title="Caja">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Caja
      </a>
      <a class="link-btn" data-path="/check-in" title="Check-in">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Check-in
      </a>
      <a class="link-btn" data-path="/configuracion" title="Config">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M1 12h2M21 12h2M12 1v2M12 21v2"/></svg>
        Config
      </a>
    </nav>

    <div class="divider"></div>

    <section class="contacts-section">
      <div class="section-header">
        <span class="section-title">Contactos detectados</span>
        <button id="scanBtn" class="scan-btn">Escanear</button>
      </div>
      <div id="contactsList" class="contacts-list">
        <p class="empty-msg">Hacé clic en "Escanear" para detectar<br/>datos de contacto en esta página.</p>
      </div>
    </section>

    <div class="divider"></div>

    <section class="settings-section">
      <label class="settings-label">URL de CourtOps</label>
      <input id="courtopsUrl" class="url-input" type="text" placeholder="https://app.courtops.net" />
      <button id="saveUrl" class="save-btn">Guardar</button>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
