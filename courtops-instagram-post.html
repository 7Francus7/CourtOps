<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>CourtOps — Instagram Post</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      background: #000000;
      overflow: hidden;
    }

    .post {
      width: 1080px;
      height: 1080px;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background grain texture via SVG */
    .bg-noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.6;
    }

    /* Very subtle warm vignette */
    .bg-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
    }

    /* Corner frame */
    .corner {
      position: absolute;
      width: 80px;
      height: 80px;
    }
    .corner-tl { top: 56px; left: 56px; border-top: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
    .corner-tr { top: 56px; right: 56px; border-top: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }
    .corner-bl { bottom: 56px; left: 56px; border-bottom: 1px solid rgba(255,255,255,0.15); border-left: 1px solid rgba(255,255,255,0.15); }
    .corner-br { bottom: 56px; right: 56px; border-bottom: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo */
    .logo-wrap {
      margin-bottom: 44px;
    }
    .logo-wrap svg {
      width: 148px;
      height: 148px;
      border-radius: 34px;
      display: block;
    }

    /* Thin rule above brand */
    .rule {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.2);
      margin-bottom: 28px;
    }

    /* Brand name */
    .brand {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 96px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 24px;
      text-shadow: 0 0 40px rgba(255,255,255,0.18);
    }

    /* Tagline */
    .tagline {
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: rgba(255, 255, 255, 1.0);
      letter-spacing: 1.5px;
      text-align: center;
      margin-bottom: 60px;
      text-transform: uppercase;
    }

    /* Feature list */
    .features {
      display: flex;
      gap: 12px;
      margin-bottom: 60px;
    }
    .chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
    }
    .chip-line {
      width: 16px;
      height: 1px;
      background: rgba(245, 240, 232, 0.6);
      flex-shrink: 0;
    }
    .chip-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: rgba(255, 255, 255, 1.0);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* Coming soon */
    .coming-soon {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .cs-line {
      width: 48px;
      height: 1px;
      background: rgba(245,240,232,0.35);
    }
    .cs-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* Bottom */
    .bottom-bar {
      position: absolute;
      bottom: 72px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
    }
    .domain {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: rgba(245, 240, 232, 0.18);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="post">

    <div class="bg-noise"></div>
    <div class="bg-vignette"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="content">

      <div class="logo-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
          <rect width="60" height="60" rx="13" fill="#111111"/>
          <g transform="translate(-2, 10)">
            <path d="M 28 6 A 14 14 0 1 0 28 34" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
            <circle cx="36" cy="20" r="14" fill="none" stroke="#00e676" stroke-width="8"/>
            <circle cx="36" cy="20" r="4" fill="#ffffff"/>
          </g>
        </svg>
      </div>

      <div class="rule"></div>

      <div class="brand">CourtOps</div>

      <div class="tagline">Gestión de clubes de pádel</div>

      <div class="features">
        <div class="chip">
          <div class="chip-line"></div>
          <span class="chip-text">Reservas online</span>
        </div>
        <div class="chip">
          <div class="chip-line"></div>
          <span class="chip-text">Gestión integral</span>
        </div>
        <div class="chip">
          <div class="chip-line"></div>
          <span class="chip-text">Multi-club SaaS</span>
        </div>
      </div>

      <div class="coming-soon">
        <div class="cs-line"></div>
        <span class="cs-text">Próximamente</span>
        <div class="cs-line"></div>
      </div>

    </div>

    <div class="bottom-bar">
      <span class="domain">courtops.net</span>
    </div>

  </div>
</body>
</html>
